<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=h, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 내가한것 */
        .contaimer{
            width: 200px; height: 100px; border: 3px solid black;
            background-color: white;
        }
        a{ font-size: 15px; text-decoration: none; color: black;
            line-height: 100px; margin-left: 13px;
        }
        .dot{ padding-left: 20px; position: relative;}
        .dot::before{
            content: '';  
            width: 4px; height: 4px;
            background: black; border-radius: 50%; 
            position: absolute;
            /* 메뉴2 앞여백의 중심으로 이동(점의 시작지점을) */
            top: 12px; left: 10px;
            /* 점을 가운데 이동시키기 위해 점 크기의 반씩 왼쪽 위로 이동 */
            margin-left: -2px; margin-top: -2px;
        }
        
    </style>
</head>
<body>
    <!-- 내가한것 -->
    <div class="contaimer">
        <div class="wrap">
            <a href="쿠팡">쿠팡</a>
            <span class="dot"></span>
            <a href="지마켓">G마켓</a>
            <span class="dot"></span>
            <a href="옥션">옥션</a>
        </div>
    </div>
    
</body>
</html>
