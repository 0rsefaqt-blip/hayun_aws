<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>박스 예제</title>
    <style>
        .container{ 
            border: 3px solid black; width: 300px; margin-bottom: 10px; }
        .box{ height: 100px; width: 280px; background: red;}
        .container>.box{margin: 10px;}


        .container1{ width: 300px; border: 3px solid black;}
        .wrap{ padding: 10px;}
        .container1>.box{ width: 100%; height: 100px; background-color: red;}
        /* 
        컨테이너 안의 박스를 가운데로 옮길때 

        1.안의 박스의 시작지점을 옮기는 방법 
        .container>.box{margin: 10px; }
        
        2. 컨테이너 기준으로 사진의 시작지점을 바꾸는 것 padding
        .container1{padding: 10px; width: 280px; height: auto; }
        너비나 높이를 계산하지 않아도 돼서 많이 씀
        */
        







        /* margin을 이용하여 배치 */
		.container{
			width: 300px; height: 120px; border: 3px solid black; margin-bottom: 10px;
		}
		.box{ width: 280px; height: 100px; background: red;}
		.container>.box{margin: 10px;	}

		/* padding을 이용하여 배치 : 너비나 높이를 계산하지 않아도 됨 */
		.container1{ width: 300px; border: 10px solid black;margin-bottom: 10px;}
		.wrap{ padding: 10px;}
		.container1>.box{ width: 100%; height: 100px; background-color: red;}

        .container2{ width: 300px; border: 10px solid black; padding: 10px; box-sizing: border-box;}
		.container2>.box{ width: 100%; height: 100px; background-color: red;}
	

    </style>
</head>
<body>
    <div class="container">
        <div class="box"></div>
    </div>
    <div class="container1">
        <div class="wrap">
            <div class="box"></div>
        </div>
    </div>

    <div class="container2">
        <div class="box"></div>
    </div>
</body>
</html>
