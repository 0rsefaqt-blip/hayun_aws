<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과제</title>
    <style>
        
        .container{ 
            width: 480px; border: 2px solid black; padding: 10px;
            background: blue;   
        }
        .box1,.box2{ 
            width: 235px; height: 100px; background-color: red;  
        }
        .box1{ float: left; margin-right: 10px; }
    
        .box2{ 
            float: left; 
        }
        .container::after{content: ''; display: block; clear: both;}
       
    </style>
</head>
<body>
    <div class="container">
       
        <div class="box1"></div>
        <div class="box2"></div>
        
    </div>
</body>
</html>
