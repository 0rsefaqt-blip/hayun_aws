<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과제</title>
    <style>
        
        .container{ border: 3px solid black; background: blue; width: 500px; 
            overflow: hidden; padding: 10px;}
        

        .box{ border: 0; height: 100px; width: 235px; background: red;
        float: left; box-sizing: border-box;}
        .box+.box{margin-left: 10px;}
        .container::after{ clear: both; content: ''; display: block;}
    </style>
</head>
<body>
    <div class="container">
            <div class="box"></div>
            <div class="box"></div>
        </div>
    </div>
</body>
</html>
