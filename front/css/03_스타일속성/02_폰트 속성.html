<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>폰트 속성 예제</title>
    <!--
    color(p.105)
    - 글자 색상

    색상 지정 방식
    1. 미리 지정된 이름을 사용
        - red, blue, green 등과 같이 100개가 넘는 이름
    2. rgb함수/rgba함수를 이용
        - rgb(r숫자, g숫자, b숫자), rgba(r숫자, g숫자, b숫자, 투명도)
        - 숫자 : 0~255, r : 빨강, g : 녹색, b : 파랑
        - 투명도 : 0~1, 0 : 투명, 1 : 불투명
    3. 16진수 이용
        - red => rgb(255,0,0) => #ff0000 => #f00
    4. hsl(색상, 채도, 명도)
        - 색상, 채도, 명도를 이용하여 색상을 표시=>rgb보다 더 넓은 범위의 색상 표현 가능

    font-weight(p.90)
    - 폰트 굵기
    - 100~900의 값을 100단위로 사용
    - namal : 400
    - bold : 700

    font-size(p.91)
    - 폰트 크기
    - 숫자와 단위를 함께 사용(단위 빼먹지 말자)

    
    -->
</head>
