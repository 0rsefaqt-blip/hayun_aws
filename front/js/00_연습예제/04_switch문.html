<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  
  <script>
    /*
    prompt로 문자를 입력받아 문자가 +, -, *, /, %이면 산술연산자라고 출력하고
    아니면 산술연산자가 아닙니다라고 출력하는 코드를 switch문으로 작성하세요
    */
    let 문자 = prompt("기호");
    switch(문자){
      case '+': case '-': case '*': case '/': case '%':
        document.write(문자 + "는 산술연산자<br>");
        break;
      default:
        document.write(문자 +"는 산술연산자가 아닙니다.<br>");
    }

  </script>
</body>
</html>
