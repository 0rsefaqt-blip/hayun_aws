<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
   
  <script>
    /*
    prompt를 이용하여 두 정수를 입력받아 두 정수의 합을 alert으로 출력하는 코드를 작성하세요.
    - prompt를 이용하여 입력을 받으면 값에 상관없이 타입이 문자열이다
    */

    let number1 = prompt("숫자1", '');
    let number2 = prompt("숫자2", '');
    
    alert(`${parseInt(number1) + parseInt(number2)}`)
    
     
  </script>
</body>
</html>
