<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    #form{
      width: 500px;
      margin: 0 auto; padding: 10px;
      box-shadow:  0 0 2px 0 rgba(0, 0, 0, 0.7);
      /* 둥근 테두리 */
      border-radius: 5px;
    }
    .form-control{
      /* 테두리를 포함해서 너비가 100%가 되도록. 설정 안하면 오른쪽 여백이 조금 작음 */
      display: block; width: 100%; box-sizing: border-box;
      margin-bottom: 10px;
      height: 50px; font-size: 18px;
      border-radius: 5px;
    }
    textarea.form-control{
      height: 400px;
    }
    .btn{
      display: block; width: 100%;
      box-sizing: border-box;
      cursor: pointer;
    }
    .table{
      width: 500px;
      margin: 20px auto;
      border-collapse: collapse;
    }
    .table tr{
      border: 1px solid black;
      border-width: 1px 0;
      line-height: 30px;
    }
    .table thead th:nth-of-type(1),
    .table tbody td:nth-of-type(1){
      width: 10%; text-align: center;
    }
    .table thead th:nth-of-type(2),
    .table tbody td:nth-of-type(2){
      width: 70%; 
    }
    .table thead th:nth-of-type(3),
    .table tbody td:nth-of-type(3){
      width: 20%; text-align: center;
    }
  </style>
</head>
<body>
  <form action="" id="form">
    <!-- 제목, 내용, 작성자를 입력하여 게시글 등록 -->

     <input type="text" id="title" name="title" class="form-control" placeholder="제목을 입력하세요.">
     <input type="text" id="writer" name="writer" class="form-control" placeholder="작성자를 입력하세요.">     
     <textarea name="content" id="content" class="form-control" placeholder="내용을 입력하세요."></textarea>
     <button class="btn">등록</button>
     
  </form>
  <table class="table">
    <thead>
      <tr>
        <th>번호</th>
        <th>제목</th>
        <th>작성자</th>
      </tr>
    </thead>
    <tbody>
      <!--
      <tr>
        <td>1</td>
        <td>
          <a href="#">게시글</a>
        </td>
        <td>admin</td>
      </tr>
      -->
    </tbody>
  </table>
  <script>

    
    let posts = [];
    
    
    const form = document.querySelector('#form');
    
    form.addEventListener('submit', function(e){
      
      e.preventDefault();
      
      const titleEl = document.querySelector('#title');
      let title = titleEl.value;
      
      const writerEl = document.querySelector('#writer');
      let writer = writerEl.value;
      
      const contentEl = document.querySelector('#content');
      let content = contentEl.value;

      console.log(title, writer, content)

      
      let post = {
        num : posts.length + 1,
        title : title,
        writer : writer,
        content : content
      }
      
      insertPostToTable(post)
      
      posts.push(post)
      localStorage.setItem('posts', JSON.stringify(posts))
    });
    
    function insertPostToTable(post){
      
      if(!post){
        return;
      }
      
      const tbodyE1 = document.querySelector('.table tbody');
      let str = `
        <tr>
          <td>${post.num}</td>
          <td>
            <a href="#">${post.title}</a>
          </td>
          <td>${post.writer}</td>
        </tr>
      `
      tbodyE1.innerHTML = tbodyE1.innerHTML + str;
    }
    document.addEventListener('DOMContentLoaded', function(){
      
      posts = JSON.parse(localStorage.getItem('posts'));
      if(!posts){
        posts = [];
        return;
      }
      
      for(i=0; i< posts.length; ++i){
        let post = posts[i];
        insertPostToTable(post);
      }
    });
  </script>
</body>
</html>
