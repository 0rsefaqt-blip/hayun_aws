<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
   .form{
      width: 500px;
      box-shadow: 0 0 5px black;
      border-radius: 5px;
      margin: 0 auto;
      padding: 10px;
   }
   .form-control, .btn{
    box-sizing: border-box;
    display: block;
    width: 100%;
    margin-bottom: 10px;
    border-radius: 5px;
   }
   .form-control{
    line-height: 30px;
   }
   textarea{
    height: 200px;
   }
  </style>
</head>
<body>
  <form action="" class="form">
    <input type="text" name="" id="title" class="form-control" placeholder="제목을 입력하세요">
    <input type="text" name="" id="writer" class="form-control" placeholder="작성자를 입력하세요">
    <textarea name="" id="content" class="form-control" placeholder="내용을 입력하세요"></textarea>
    <button class="btn">등록</button>
  </form>
  <script>

  </script>
</body>
</html>
