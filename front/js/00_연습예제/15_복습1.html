<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>연습 예제</title>
</head>
<body>
  <button class="button">+</button>
  <div class="box">1</div>
  <!-- + 버튼을 클릭하면 박스에 숫자가 1씩 증가하도록 작성하세요 -->
  <script>

    const button1 = document.querySelector('.button')
    const box1 = document.querySelector('.box')
      button1.addEventListener('click', function(){
        //박스의 텍스트 가져오기
        let text = box1.innerText; //innerText와 textContent는 같은말 textContent를 써야하는이유 자동완성이 되기 때문에
        //console.log(text)
        //가져온 텍스트를 정수로 변환 
      
        //정수를 1증가
        //text1 = parseInt(text)라는 가정하에
        //text1 = text1 + 1; 도 되고 ++text1; 도 됨 
        let text1 = parseInt(text) + 1 ; //나는 이렇게 씀
        //console.log(text1)
        //박스의 텍스트를 증가한 정수로 수정
        box1.innerText = text1;
      })
    
  </script>
</body>
</html>
