<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    #form{
      width: 500px;
      margin: 0 auto; padding: 10px;
      box-shadow:  0 0 2px 0 rgba(0, 0, 0, 0.7);
      /* 둥근 테두리 */
      border-radius: 5px;
    }
    .form-control{
      /* 테두리를 포함해서 너비가 100%가 되도록. 설정 안하면 오른쪽 여백이 조금 작음 */
      display: block; width: 100%; box-sizing: border-box;
      margin-bottom: 10px;
      height: 50px; font-size: 18px;
      border-radius: 5px;
    }
    textarea.form-control{
      height: 400px;
    }
    .btn{
      display: block; width: 100%;
      box-sizing: border-box;
      cursor: pointer;
      
    }
    .table{
      width: 500px;
      margin: 20px auto;
      border-collapse: collapse;
    }
    .table tr{
      border: 1px solid black;
      border-width: 1px 0;
      line-height: 30px;
    }
    .table thead th:nth-of-type(1),
    .table tbody td:nth-of-type(1){
      width: 10%; text-align: center;
    }
    .table thead th:nth-of-type(2),
    .table tbody td:nth-of-type(2){
      width: 70%; 
    }
    .table thead th:nth-of-type(3),
    .table tbody td:nth-of-type(3){
      width: 20%; text-align: center;
    }
  </style>
</head>
<body>
  <form action="" id="form">
    <!-- 제목, 내용, 작성자를 입력하여 게시글 등록 -->

     <input type="text" id="title" name="title" class="form-control" placeholder="제목을 입력하세요.">
     <input type="text" id="writer" name="writer" class="form-control" placeholder="작성자를 입력하세요.">     
     <textarea name="content" id="content" class="form-control" placeholder="내용을 입력하세요."></textarea>
     <button class="btn">등록</button>
    
  </form>
  <table class="table">
    <thead>
      <tr>
        <th>번호</th>
        <th>제목</th>
        <th>작성자</th>
      </tr>
    </thead>
    <tbody>
      <!--
      <tr>
        <td>1</td>
        <td>
          <a href="#">게시글</a>
        </td>
        <td>admin</td>
      </tr>
      -->
    </tbody>
  </table>
  <script>


    // 등록
    //    ↓
    // posts.push()
    //    ↓
    // localStorage.setItem()
    //    ↓
    // 새로고침
    //    ↓
    // getItem()
    //    ↓
    // JSON.parse()
    //    ↓
    // for문으로 화면 출력

    
    //현재 등록된 게시글들을 관리하는 배열
    let posts = [];
    //form태그가 전송될때 (등록버튼을 클릭했을때) 이벤트 등록 
    //1. 요소 선택
    const form = document.querySelector('#form');
    //2. 이벤트 등록
    //전송할때 서브밋
    form.addEventListener('submit', function(e){
      //전송 기능 막기
      e.preventDefault(); //태그의 기본 기능을 막음
      //제목 가져오기
      const titleEl = document.querySelector('#title');
      let title = titleEl.value;
      //작성자 가져오기
      const writerEl = document.querySelector('#writer');
      let writer = writerEl.value;
      //내용 가져오기
      const contentEl = document.querySelector('#content');
      let content = contentEl.value;

      console.log(title, writer, content)

      //제목, 작성자, 내용을 이용하여 객체를 생성
      let post = {
        num : posts.length + 1,
        title : title,
        writer : writer,
        content : content
      }
      
      /*
      등록 작업 시작
       ↓
      ① 화면에 게시글 보여주기 (insertPostToTable 함수)
       ↓
      ② 게시글 목록에 추가하기 (posts.push)
       ↓
      ③ 브라우저에 저장하기 (localStorage.setItem)
       ↓
      */

      //게시글을 테이블에 추가
      insertPostToTable(post)
      //로컬 스토리지에 저장
      posts.push(post)
      localStorage.setItem('posts', JSON.stringify(posts))
    });
    // 여기까지의 설명
    function insertPostToTable(post){
      //게시글이 비어 있으면
      if(!post){
        return;
      }
      // 1. 게시글 정보를 추가할 요소를 선택
      const tbodyE1 = document.querySelector('.table tbody');
      let str = `
        <tr>
          <td>${post.num}</td>
          <td>
            <a href="#">${post.title}</a>
          </td>
          <td>${post.writer}</td>
        </tr>
      `
      tbodyE1.innerHTML = tbodyE1.innerHTML + str;
    }

    // 새로고침하면 화면과 posts 배열은 초기화
    // localstorage는 초기화되지않음
    // 그래서 localstorage에서 다시 읽어서 화면에 출력하는 코드가 필요한것

    //화면이 로딩되면 로컬 스토리지에 있는 게시글 목록을 가져와서 화면에 출력
    document.addEventListener('DOMContentLoaded', function(){
      //로컬 저장소에서 게시글 목록을 가져옴
      posts = JSON.parse(localStorage.getItem('posts'));
      
      //저장된 게시글 목록이 없으면
      if(!posts){
        posts = [];
        return;
      }
      //가져온 게시글 목록을 반복문으로 화면에 출력
      for(i=0; i< posts.length; ++i){
        let post = posts[i];
        insertPostToTable(post);
      }
    });
  </script>
</body>
</html>
