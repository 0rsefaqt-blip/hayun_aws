<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  
  <script>
   /*
   앞에서 했던 구구단 예제를 참고해서 num단을 출력하는 함수를 만드세요.
    그리고 호출해서 화면에 구구단 num단이 출력되도록 작성하세요.
    할일 : 구구단 num단을 출력
    매개변수 : 출력할 단
    결과물 : 없음
    */

    function 구구단(단){
      //구구단 출력
      let 숫자 = 1;
      for(숫자 = 1; 숫자 <= 9 ; ++숫자){
        document.write(`${단} X ${숫자} = ${숫자 * 단}<br>`);
      }
    }
    document.write(`<h1>구구단 예제</h1>`);
    let 단;
    for(단 = 2; 단 <= 9 ; ++단){
      구구단(단)
    }
  
  </script>
</body>
</html>
